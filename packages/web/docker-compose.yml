services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmabook_web
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://pharmabook_api:3000
      NEXT_PUBLIC_WS_URL: ws://pharmabook_api:3000/ws
      PORT: 3002
      HOSTNAME: 0.0.0.0
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
    networks:
      - pharmabook_net

networks:
  pharmabook_net:
    external: true
    name: backend_pharmabook_net
