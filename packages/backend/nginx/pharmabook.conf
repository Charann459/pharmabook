# /etc/nginx/sites-available/pharmabook.conf
# Symlink: ln -s /etc/nginx/sites-available/pharmabook.conf /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.pharmabook.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.pharmabook.in;

    # SSL — managed by certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.pharmabook.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pharmabook.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "no-referrer"       always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # Proxy to Node.js API container
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # WebSocket upgrade — /ws endpoint
    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # Keep WS connections alive for 1 hour
        proxy_send_timeout 3600s;
    }

    # Health check (no auth, used by Docker healthcheck)
    location /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # Serve generated bill PDFs directly from volume
    location /pdfs/ {
        alias  /var/pharmabook/pdfs/;
        add_header Content-Disposition inline;
        types { application/pdf pdf; }
        # Only allow access with a valid token in query string (future: signed URLs)
        # For now, restrict to local network
        allow  10.0.0.0/8;
        allow  192.168.0.0/16;
        deny   all;
    }

    client_max_body_size 1m;
}
