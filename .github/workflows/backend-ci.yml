name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'

jobs:
  test:
    name: Test (Node 20)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pharmabook_test
          POSTGRES_USER: pharma
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run migrations
        working-directory: packages/backend
        env:
          DATABASE_URL: postgres://pharma:testpassword@localhost:5432/pharmabook_test
          POSTGRES_DB: pharmabook_test
          POSTGRES_USER: pharma
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-that-is-long-enough-for-validation-32chars
          JWT_EXPIRES_IN: 7d
          PDF_OUTPUT_DIR: /tmp/pharmabook-pdfs
          BARCODE_CACHE_TTL_SECONDS: 60
          LOW_STOCK_DEFAULT_THRESHOLD: 10
          EXPIRY_WARN_DAYS: 30
          CORS_ORIGINS: http://localhost:3000
        run: node scripts/migrate.js

      - name: Run tests
        working-directory: packages/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://pharma:testpassword@localhost:5432/pharmabook_test
          POSTGRES_DB: pharmabook_test
          POSTGRES_USER: pharma
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-that-is-long-enough-for-validation-32chars
          JWT_EXPIRES_IN: 7d
          PDF_OUTPUT_DIR: /tmp/pharmabook-pdfs
          BARCODE_CACHE_TTL_SECONDS: 60
          LOW_STOCK_DEFAULT_THRESHOLD: 10
          EXPIRY_WARN_DAYS: 30
          CORS_ORIGINS: http://localhost:3000
        run: pnpm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/backend/coverage/